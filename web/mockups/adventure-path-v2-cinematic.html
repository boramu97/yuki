<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Düello Adası — Sinematik Yol</title>
<style>
:root {
    --bg: #0d0b0e;
    --gold: #e8c840;
    --gold-warm: #c9a646;
    --gold-border: rgba(180,140,60,0.2);
    --gold-glow: rgba(232,200,64,0.3);
    --text: #d4c8a0;
    --text-dim: #776a50;
    --text-muted: #5a5040;
    --red: #e05040;
    --green: #5cb85c;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* Header */
.adv-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--gold-border);
    background: rgba(13,11,14,0.85);
    backdrop-filter: blur(12px);
    z-index: 20;
    flex-shrink: 0;
}
.btn-back { background: transparent; border: 1px solid var(--gold-border); color: var(--text);
    font-family: inherit; padding: 9px 16px; cursor: pointer; letter-spacing: 1px; }
.btn-back:hover { border-color: rgba(200,170,60,0.5); background: rgba(180,140,60,0.06); }
.hdr-title { color: var(--gold); font-weight: 300; letter-spacing: 0.4em; font-size: 1.2rem; text-transform: uppercase; }
.hdr-progress {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
}
.hdr-progress strong { color: var(--gold); }

/* Scene container — horizontal scroll viewport */
.scene {
    flex: 1;
    position: relative;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-behavior: smooth;
}
.scene::-webkit-scrollbar { height: 6px; }
.scene::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
.scene::-webkit-scrollbar-thumb { background: rgba(200,170,60,0.3); border-radius: 3px; }

/* Parallax layers */
.parallax {
    position: relative;
    height: 100%;
    width: 3800px; /* total journey width */
}

.layer {
    position: absolute;
    top: 0;
    height: 100%;
    pointer-events: none;
}
/* Far sky */
.layer-sky {
    left: 0; right: 0; width: 100%;
    background: linear-gradient(180deg,
        #0a0612 0%,
        #1a1028 20%,
        #2a1838 45%,
        #3a1828 65%,
        #2a1020 80%,
        #0a0612 100%);
}
/* Stars */
.layer-stars {
    left: 0; width: 100%;
    background-image:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.7) 0.5px, transparent 1.5px),
        radial-gradient(circle at 30% 15%, rgba(255,230,160,0.5) 0.5px, transparent 1.5px),
        radial-gradient(circle at 55% 25%, rgba(255,255,255,0.5) 0.5px, transparent 1.5px),
        radial-gradient(circle at 80% 18%, rgba(200,230,255,0.5) 0.5px, transparent 1.5px),
        radial-gradient(circle at 95% 30%, rgba(255,255,255,0.6) 0.5px, transparent 1.5px);
    background-size: 500px 300px;
    background-repeat: repeat-x;
    opacity: 0.7;
    animation: twinkle 6s ease-in-out infinite;
}
@keyframes twinkle { 0%,100% {opacity:0.5} 50% {opacity:0.9} }

/* Far mountains */
.layer-mountains {
    left: 0; width: 100%;
    bottom: 0;
    height: 45%;
    background:
        linear-gradient(180deg, transparent 0%, rgba(80,60,90,0.4) 40%, rgba(40,30,50,0.8) 100%);
    clip-path: polygon(0% 100%,
        0% 75%, 5% 55%, 10% 65%, 15% 45%, 22% 60%, 28% 40%,
        35% 55%, 42% 35%, 50% 50%, 58% 30%, 65% 50%, 72% 35%,
        80% 45%, 88% 25%, 95% 40%, 100% 30%, 100% 100%);
}
/* Closer hills */
.layer-hills {
    left: 0; width: 100%;
    bottom: 0;
    height: 30%;
    background: linear-gradient(180deg, rgba(50,40,60,0.6) 0%, rgba(20,15,25,0.95) 100%);
    clip-path: polygon(0% 100%,
        0% 60%, 8% 45%, 15% 55%, 25% 40%, 35% 55%, 45% 35%,
        55% 50%, 65% 40%, 75% 55%, 85% 35%, 95% 50%, 100% 45%, 100% 100%);
}
/* Ground path */
.layer-ground {
    left: 0; width: 100%;
    bottom: 0;
    height: 80px;
    background:
        linear-gradient(180deg,
            rgba(90,70,50,0.4) 0%,
            rgba(40,30,20,0.9) 50%,
            #0a0806 100%);
    border-top: 1px solid rgba(180,140,60,0.3);
    box-shadow: inset 0 8px 12px -4px rgba(232,200,64,0.08);
}

/* Path dashes */
.path-trail {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    height: 3px;
    z-index: 1;
    background: repeating-linear-gradient(
        to right,
        rgba(232,200,64,0.5) 0 10px,
        transparent 10px 22px
    );
}

/* Nodes along the path */
.node-row {
    position: absolute;
    bottom: 40px;
    height: 100%;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateX(-50%);
}
.node-portrait {
    position: relative;
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 3px solid rgba(180,140,60,0.5);
    background: radial-gradient(circle at 30% 30%, #1a1418, #0a0812);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(.2,.8,.3,1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    font-family: inherit; color: inherit;
    margin-bottom: 100px;
}
.node-portrait .portrait-icon {
    font-size: 2.8rem;
    line-height: 1;
}
.node-portrait::before {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--gold-glow), transparent 70%);
    opacity: 0;
    z-index: -1;
    transition: opacity 0.3s;
}
.node-portrait:hover::before { opacity: 1; }
.node-portrait:hover:not(.locked):not(.done) {
    transform: translateY(-4px);
    border-color: var(--gold);
}

.node-portrait.done {
    border-color: var(--green);
    opacity: 0.8;
}
.node-portrait.done::after {
    content: '✓';
    position: absolute;
    bottom: -8px; right: -8px;
    width: 32px; height: 32px;
    background: var(--green);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    box-shadow: 0 0 16px rgba(92,184,92,0.6);
    border: 2px solid #0a0812;
}

.node-portrait.current {
    border-color: var(--gold);
    box-shadow: 0 8px 40px var(--gold-glow), inset 0 0 16px rgba(232,200,64,0.15);
    animation: float 3s ease-in-out infinite;
}
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

.node-portrait.locked {
    opacity: 0.4;
    cursor: not-allowed;
    filter: grayscale(0.6);
}

.node-portrait.boss {
    width: 150px; height: 150px;
    border-color: var(--red);
    background: radial-gradient(circle at 30% 30%, #3a1018, #1a0508);
    box-shadow: 0 12px 40px rgba(224,80,64,0.4);
}
.node-portrait.boss .portrait-icon { font-size: 4rem; }

/* Event node (non-duel) — different shape */
.node-portrait.event {
    width: 80px; height: 80px;
    border-style: dashed;
    border-width: 2px;
}
.node-portrait.event .portrait-icon { font-size: 2rem; }

/* Label above node */
.node-label {
    position: absolute;
    bottom: calc(100% - 80px);
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    text-align: center;
    pointer-events: none;
}
.label-name {
    font-size: 1rem;
    color: var(--text);
    font-weight: 400;
    letter-spacing: 0.1em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    margin-bottom: 4px;
}
.label-type {
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.8;
}

/* Act/chapter markers on path */
.act-marker {
    position: absolute;
    top: 30px;
    transform: translateX(-50%);
    text-align: center;
    z-index: 3;
    pointer-events: none;
}
.act-marker-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 4px;
}
.act-marker-name {
    font-size: 1.4rem;
    color: var(--gold);
    font-weight: 300;
    letter-spacing: 0.15em;
}

/* Scroll hint */
.scroll-hint {
    position: absolute;
    bottom: 20px; right: 24px;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    z-index: 10;
    animation: nudge 2s ease-in-out infinite;
}
@keyframes nudge {
    0%,100% { transform: translateX(0); opacity: 0.6; }
    50% { transform: translateX(6px); opacity: 1; }
}

@media (max-width: 640px) {
    .parallax { width: 2400px; }
    .node-portrait { width: 80px; height: 80px; margin-bottom: 60px; }
    .node-portrait .portrait-icon { font-size: 2rem; }
    .node-portrait.boss { width: 110px; height: 110px; }
    .node-portrait.boss .portrait-icon { font-size: 2.8rem; }
    .act-marker-name { font-size: 1rem; }
    .hdr-progress { display: none; }
}
</style>
</head>
<body>

<header class="adv-header">
    <button class="btn-back">← Maceralar</button>
    <h1 class="hdr-title">Düello Adası</h1>
    <div class="hdr-progress">Aşama <strong>2/7</strong></div>
</header>

<div class="scene" id="scene">
    <div class="parallax">

        <div class="layer layer-sky"></div>
        <div class="layer layer-stars"></div>
        <div class="layer layer-mountains"></div>
        <div class="layer layer-hills"></div>
        <div class="layer layer-ground"></div>
        <div class="path-trail"></div>

        <!-- Act markers -->
        <div class="act-marker" style="left: 400px;">
            <div class="act-marker-label">I. Bölüm</div>
            <div class="act-marker-name">Sahil</div>
        </div>
        <div class="act-marker" style="left: 1700px;">
            <div class="act-marker-label">II. Bölüm</div>
            <div class="act-marker-name">Orman</div>
        </div>
        <div class="act-marker" style="left: 3000px;">
            <div class="act-marker-label">III. Bölüm</div>
            <div class="act-marker-name">Kale</div>
        </div>

        <!-- Nodes along the path -->
        <div class="node-row" style="left: 220px;">
            <button class="node-portrait done">
                <div class="portrait-icon">&#x1F996;</div>
                <div class="node-label">
                    <div class="label-name">Rex Raptor</div>
                    <div class="label-type">Duelist</div>
                </div>
            </button>
        </div>

        <div class="node-row" style="left: 550px;">
            <button class="node-portrait event done">
                <div class="portrait-icon">&#x2753;</div>
                <div class="node-label">
                    <div class="label-name">Harabeler</div>
                    <div class="label-type">Gizem</div>
                </div>
            </button>
        </div>

        <div class="node-row" style="left: 820px;">
            <button class="node-portrait current">
                <div class="portrait-icon">&#x1FAB2;</div>
                <div class="node-label">
                    <div class="label-name">Weevil</div>
                    <div class="label-type">Duelist</div>
                </div>
            </button>
        </div>

        <div class="node-row" style="left: 1150px;">
            <button class="node-portrait event locked">
                <div class="portrait-icon">&#x1F4B0;</div>
                <div class="node-label">
                    <div class="label-name">Gezgin</div>
                    <div class="label-type">Dükkân</div>
                </div>
            </button>
        </div>

        <div class="node-row" style="left: 1500px;">
            <button class="node-portrait locked">
                <div class="portrait-icon">&#x1F985;</div>
                <div class="node-label">
                    <div class="label-name">Mai Valentine</div>
                    <div class="label-type">Duelist</div>
                </div>
            </button>
        </div>

        <div class="node-row" style="left: 1900px;">
            <button class="node-portrait event locked">
                <div class="portrait-icon">&#x1F525;</div>
                <div class="node-label">
                    <div class="label-name">Kamp Ateşi</div>
                    <div class="label-type">Dinlen</div>
                </div>
            </button>
        </div>

        <div class="node-row" style="left: 2200px;">
            <button class="node-portrait locked">
                <div class="portrait-icon">&#x1F3B2;</div>
                <div class="node-label">
                    <div class="label-name">Joey Wheeler</div>
                    <div class="label-type">Duelist</div>
                </div>
            </button>
        </div>

        <div class="node-row" style="left: 2600px;">
            <button class="node-portrait event locked">
                <div class="portrait-icon">&#x1F52E;</div>
                <div class="node-label">
                    <div class="label-name">Falcı</div>
                    <div class="label-type">Gizem</div>
                </div>
            </button>
        </div>

        <div class="node-row" style="left: 2950px;">
            <button class="node-portrait locked">
                <div class="portrait-icon">&#x1F3B4;</div>
                <div class="node-label">
                    <div class="label-name">Paradox</div>
                    <div class="label-type">Elit · 2 Rakip</div>
                </div>
            </button>
        </div>

        <div class="node-row" style="left: 3400px;">
            <button class="node-portrait boss locked">
                <div class="portrait-icon">&#x1F409;</div>
                <div class="node-label">
                    <div class="label-name">Seto Kaiba</div>
                    <div class="label-type">Final Boss</div>
                </div>
            </button>
        </div>

    </div>
    <div class="scroll-hint">Kaydır →</div>
</div>

<script>
    // Auto-scroll to current node on load
    const scene = document.getElementById('scene');
    const current = scene.querySelector('.current');
    if (current) {
        const pos = current.closest('.node-row');
        scene.scrollLeft = parseInt(pos.style.left) - window.innerWidth/2 + 55;
    }
</script>

</body>
</html>
