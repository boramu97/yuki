<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koleksiyonum — Binder View</title>
<style>
:root {
    --bg: #0d0b0e;
    --bg-hud: #1a1520;
    --gold: #e8c840;
    --gold-border: rgba(180,140,60,0.12);
    --gold-glow: rgba(200,160,40,0.2);
    --purple: #9a6aba;
    --text: #d4c8a0;
    --text-dim: #776a50;
    --text-muted: #5a5040;
    --danger: #e05040;
    --panel-bg: rgba(13,11,14,0.94);
    --monster: #e8a040;
    --spell: #4a9a6a;
    --trap: #c45a8a;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    padding: 0 24px;
    background: var(--bg-hud);
    border-bottom: 1px solid var(--gold-border);
    flex-shrink: 0;
}
.header-left {
    display: flex;
    align-items: center;
    gap: 20px;
}
.btn-back {
    padding: 6px 16px;
    border: 1px solid rgba(180,140,60,0.2);
    border-radius: 4px;
    background: rgba(180,140,60,0.04);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-back:hover {
    border-color: rgba(200,170,60,0.5);
    color: var(--text);
}
.header h1 {
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 3px;
}
.header-count {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 1px;
}

/* ===== FILTERS ===== */
.filters {
    display: flex;
    gap: 2px;
    padding: 12px 24px;
    background: var(--bg-hud);
    border-bottom: 1px solid var(--gold-border);
    flex-shrink: 0;
}
.filter-tab {
    padding: 8px 20px;
    border: 1px solid transparent;
    border-radius: 3px;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
}
.filter-tab:hover { color: var(--text-dim); background: rgba(180,140,60,0.04); }
.filter-tab.active {
    color: var(--gold);
    border-color: var(--gold-border);
    background: rgba(180,140,60,0.06);
}
.filter-tab .count { font-size: 0.75rem; opacity: 0.6; margin-left: 4px; }

/* ===== BINDER AREA ===== */
.binder-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
}

/* Binder spread (two pages) */
.binder {
    display: flex;
    gap: 0;
    max-width: 1100px;
    width: 100%;
    height: 100%;
    max-height: 520px;
    position: relative;
}
.binder-page {
    flex: 1;
    background: linear-gradient(135deg, #18141e 0%, #1a1520 50%, #151020 100%);
    border: 1px solid var(--gold-border);
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 12px;
    position: relative;
}
.binder-page.left {
    border-radius: 8px 0 0 8px;
    border-right: none;
}
.binder-page.right {
    border-radius: 0 8px 8px 0;
    border-left: 1px solid rgba(180,140,60,0.06);
}

/* Spine */
.binder-spine {
    width: 16px;
    background: linear-gradient(90deg, #12101a, #1e1828, #12101a);
    border-top: 1px solid var(--gold-border);
    border-bottom: 1px solid var(--gold-border);
    position: relative;
    flex-shrink: 0;
}
.binder-spine::before,
.binder-spine::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    border: 1px solid rgba(180,140,60,0.15);
    border-radius: 50%;
}
.binder-spine::before { top: 25%; }
.binder-spine::after { bottom: 25%; }

/* Card slot in binder */
.binder-slot {
    border: 1px solid rgba(180,140,60,0.08);
    border-radius: 4px;
    background: rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
}
.binder-slot:hover {
    border-color: rgba(180,140,60,0.25);
    box-shadow: 0 0 12px rgba(200,160,40,0.08);
}
.binder-slot.empty {
    cursor: default;
}
.binder-slot.empty::after {
    content: '';
    width: 40%;
    height: 55%;
    border: 1px dashed rgba(180,140,60,0.08);
    border-radius: 3px;
}
.binder-slot.in-deck {
    border-color: var(--gold);
    box-shadow: 0 0 10px var(--gold-glow);
}

.binder-slot img {
    width: 88%;
    aspect-ratio: 421/614;
    object-fit: cover;
    border-radius: 2px;
    filter: brightness(0.95) saturate(1.05);
    margin-top: 4px;
}
.binder-slot:hover img {
    filter: brightness(1.08) saturate(1.1);
}
.binder-slot .slot-name {
    font-size: 0.6rem;
    color: var(--text-dim);
    padding: 3px 4px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
}
.binder-slot .slot-type {
    position: absolute;
    top: 3px;
    left: 5px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
}
.binder-slot .slot-type.monster { background: var(--monster); }
.binder-slot .slot-type.spell { background: var(--spell); }
.binder-slot .slot-type.trap { background: var(--trap); }

.binder-slot .deck-badge {
    position: absolute;
    top: 3px;
    right: 5px;
    font-size: 10px;
    color: var(--gold);
    text-shadow: 0 0 4px var(--gold-glow);
}

/* Pagination */
.pagination {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
    flex-shrink: 0;
}
.page-btn {
    padding: 6px 18px;
    border: 1px solid var(--gold-border);
    border-radius: 4px;
    background: rgba(180,140,60,0.04);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
}
.page-btn:hover {
    border-color: rgba(200,170,60,0.4);
    color: var(--text);
}
.page-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}
.page-info {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 2px;
}

/* ===== DECK STRIP ===== */
.deck-strip-area {
    flex-shrink: 0;
    background: var(--bg-hud);
    border-top: 1px solid var(--gold-border);
    padding: 10px 24px;
}
.deck-strip-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
}
.deck-strip-header h2 {
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 2px;
}
.deck-strip-count {
    font-size: 0.8rem;
    color: var(--text-muted);
}
.deck-strip-count .current { color: var(--gold); }

.deck-strip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 6px;
}
.deck-strip::-webkit-scrollbar { height: 3px; }
.deck-strip::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }

.deck-strip-card {
    flex-shrink: 0;
    width: 48px;
    position: relative;
    cursor: pointer;
    transition: transform 0.15s;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--gold-border);
}
.deck-strip-card:hover {
    transform: translateY(-4px);
    border-color: rgba(180,140,60,0.3);
}
.deck-strip-card img {
    width: 100%;
    aspect-ratio: 421/614;
    object-fit: cover;
    display: block;
}
.deck-strip-empty {
    flex-shrink: 0;
    width: 48px;
    aspect-ratio: 421/614;
    border: 1px dashed rgba(180,140,60,0.1);
    border-radius: 3px;
}

/* Scan-line overlay */
body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(88,196,240,0.015) 3px,
        rgba(88,196,240,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
    animation: scanScroll 12s linear infinite;
}
@keyframes scanScroll {
    from { background-position: 0 0; }
    to { background-position: 0 100vh; }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <button class="btn-back">← Ana Sayfa</button>
        <h1>Koleksiyonum</h1>
    </div>
    <span class="header-count">60 kart</span>
</div>

<div class="filters">
    <button class="filter-tab active" data-filter="all">Tumu<span class="count">60</span></button>
    <button class="filter-tab" data-filter="monster">Canavarlar<span class="count">25</span></button>
    <button class="filter-tab" data-filter="spell">Buyuler<span class="count">20</span></button>
    <button class="filter-tab" data-filter="trap">Tuzaklar<span class="count">15</span></button>
</div>

<div class="binder-area">
    <div class="binder">
        <div class="binder-page left" id="page-left"></div>
        <div class="binder-spine"></div>
        <div class="binder-page right" id="page-right"></div>
    </div>
    <div class="pagination">
        <button class="page-btn" id="btn-prev" disabled>◂ Onceki</button>
        <span class="page-info" id="page-info">1 / 4</span>
        <button class="page-btn" id="btn-next">Sonraki ▸</button>
    </div>
</div>

<div class="deck-strip-area">
    <div class="deck-strip-header">
        <h2>Deste</h2>
        <span class="deck-strip-count"><span class="current" id="deck-num">0</span>/40</span>
    </div>
    <div class="deck-strip" id="deck-strip"></div>
</div>

<script>
const CARDS = [
    { code:46986414, name:"Dark Magician", type:"monster", atk:2500, def:2100, level:7 },
    { code:89631139, name:"Blue-Eyes White Dragon", type:"monster", atk:3000, def:2500, level:8 },
    { code:38033121, name:"Dark Magician Girl", type:"monster", atk:2000, def:1700, level:6 },
    { code:70781052, name:"Summoned Skull", type:"monster", atk:2500, def:1200, level:6 },
    { code:40640057, name:"Kuriboh", type:"monster", atk:300, def:200, level:1 },
    { code:71413901, name:"Breaker the Magical Warrior", type:"monster", atk:1600, def:1000, level:4 },
    { code:75390004, name:"Megazowler", type:"monster", atk:1800, def:2000, level:6 },
    { code:94568601, name:"Tyrant Dragon", type:"monster", atk:2900, def:2500, level:8 },
    { code:75347539, name:"Valkyrion the Magna Warrior", type:"monster", atk:3500, def:3850, level:8 },
    { code:78193831, name:"Buster Blader", type:"monster", atk:2600, def:2300, level:7 },
    { code:14778250, name:"The Tricky", type:"monster", atk:2000, def:1200, level:5 },
    { code:65240384, name:"Big Shield Gardna", type:"monster", atk:100, def:2600, level:4 },
    { code:34710660, name:"Electromagnetic Turtle", type:"monster", atk:0, def:0, level:4 },
    { code:64788463, name:"King's Knight", type:"monster", atk:1600, def:1400, level:4 },
    { code:52077741, name:"Obnoxious Celtic Guard", type:"monster", atk:1400, def:1200, level:4 },
    { code:73752131, name:"Skilled Dark Magician", type:"monster", atk:1900, def:1700, level:4 },
    { code:45141844, name:"Old Vindictive Magician", type:"monster", atk:450, def:600, level:2 },
    { code:99785935, name:"Alpha The Magnet Warrior", type:"monster", atk:1400, def:1700, level:4 },
    { code:39256679, name:"Beta The Magnet Warrior", type:"monster", atk:1700, def:1600, level:4 },
    { code:11549357, name:"Gamma The Magnet Warrior", type:"monster", atk:1500, def:1800, level:4 },
    { code:67724379, name:"Koumori Dragon", type:"monster", atk:1500, def:1200, level:4 },
    { code:15025844, name:"Mystical Elf", type:"monster", atk:800, def:2000, level:4 },
    { code:25652259, name:"Queen's Knight", type:"monster", atk:1500, def:1600, level:4 },
    { code:87796900, name:"Winged Dragon Guardian of the Fortress", type:"monster", atk:1400, def:1200, level:4 },
    { code:90876561, name:"Jack's Knight", type:"monster", atk:1900, def:1000, level:5 },
    { code:83764718, name:"Monster Reborn", type:"spell" },
    { code:55144522, name:"Pot of Greed", type:"spell" },
    { code:72302403, name:"Swords of Revealing Light", type:"spell" },
    { code:5318639,  name:"Mystical Space Typhoon", type:"spell" },
    { code:4031928,  name:"Change of Heart", type:"spell" },
    { code:24094653, name:"Polymerization", type:"spell" },
    { code:42664989, name:"Card of Sanctity", type:"spell" },
    { code:99789342, name:"Dark Magic Curtain", type:"spell" },
    { code:79571449, name:"Graceful Charity", type:"spell" },
    { code:74848038, name:"Monster Reincarnation", type:"spell" },
    { code:63391643, name:"Thousand Knives", type:"spell" },
    { code:28553439, name:"Magical Dimension", type:"spell" },
    { code:55761792, name:"Black Luster Ritual", type:"spell" },
    { code:23424603, name:"Wasteland", type:"spell" },
    { code:22431243, name:"Ultra Evolution Pill", type:"spell" },
    { code:38179121, name:"Double Evolution Pill", type:"spell" },
    { code:45141013, name:"Heat Wave", type:"spell" },
    { code:80402389, name:"Verdant Sanctuary", type:"spell" },
    { code:94716515, name:"Eradicating Aerosol", type:"spell" },
    { code:10080320, name:"Jurassic World", type:"spell" },
    { code:44095762, name:"Mirror Force", type:"trap" },
    { code:62279055, name:"Magic Cylinder", type:"trap" },
    { code:4206964,  name:"Trap Hole", type:"trap" },
    { code:29401950, name:"Bottomless Trap Hole", type:"trap" },
    { code:18807108, name:"Spellbinding Circle", type:"trap" },
    { code:74701381, name:"DNA Surgery", type:"trap" },
    { code:13235258, name:"Corrosive Scales", type:"trap" },
    { code:56051648, name:"Spider Egg", type:"trap" },
    { code:11925569, name:"Hunting Instinct", type:"trap" },
    { code:58272005, name:"Survival of the Fittest", type:"trap" },
    { code:23869735, name:"Fossil Excavation", type:"trap" },
    { code:79569173, name:"Seismic Shockwave", type:"trap" },
    { code:58419204, name:"Survival Instinct", type:"trap" },
    { code:65430834, name:"Jurassic Impact", type:"trap" },
    { code:60082869, name:"Dust Tornado", type:"trap" },
];

const deck = new Set();
const IMG = code => `https://images.ygoprodeck.com/images/cards_small/${code}.jpg`;
const PER_SPREAD = 18; // 9 per page, 2 pages
let currentPage = 0;
let activeFilter = 'all';
let filtered = [...CARDS];

function getFiltered() {
    return activeFilter === 'all' ? CARDS : CARDS.filter(c => c.type === activeFilter);
}

function totalPages() {
    return Math.max(1, Math.ceil(getFiltered().length / PER_SPREAD));
}

function renderBinder() {
    filtered = getFiltered();
    const start = currentPage * PER_SPREAD;
    const pageCards = filtered.slice(start, start + PER_SPREAD);

    const leftCards = pageCards.slice(0, 9);
    const rightCards = pageCards.slice(9, 18);

    document.getElementById('page-left').innerHTML = renderSlots(leftCards, 9);
    document.getElementById('page-right').innerHTML = renderSlots(rightCards, 9);

    document.getElementById('page-info').textContent = `${currentPage + 1} / ${totalPages()}`;
    document.getElementById('btn-prev').disabled = currentPage === 0;
    document.getElementById('btn-next').disabled = currentPage >= totalPages() - 1;

    renderDeckStrip();
}

function renderSlots(cards, total) {
    let html = '';
    for (let i = 0; i < total; i++) {
        if (i < cards.length) {
            const c = cards[i];
            const inDeck = deck.has(c.code);
            html += `<div class="binder-slot ${inDeck ? 'in-deck' : ''}" onclick="toggleDeck(${c.code})">
                <span class="slot-type ${c.type}"></span>
                ${inDeck ? '<span class="deck-badge">✦</span>' : ''}
                <img src="${IMG(c.code)}" alt="${c.name}" loading="lazy">
                <span class="slot-name">${c.name}</span>
            </div>`;
        } else {
            html += `<div class="binder-slot empty"></div>`;
        }
    }
    return html;
}

function renderDeckStrip() {
    const strip = document.getElementById('deck-strip');
    const deckCards = CARDS.filter(c => deck.has(c.code));

    let html = deckCards.map(c => `
        <div class="deck-strip-card" onclick="toggleDeck(${c.code})" title="${c.name}">
            <img src="${IMG(c.code)}" alt="${c.name}" loading="lazy">
        </div>
    `).join('');

    // Empty slots
    for (let i = deckCards.length; i < 40; i++) {
        html += `<div class="deck-strip-empty"></div>`;
    }

    strip.innerHTML = html;
    document.getElementById('deck-num').textContent = deck.size;
}

function toggleDeck(code) {
    if (deck.has(code)) deck.delete(code);
    else if (deck.size < 40) deck.add(code);
    renderBinder();
}

document.getElementById('btn-prev').onclick = () => { if (currentPage > 0) { currentPage--; renderBinder(); }};
document.getElementById('btn-next').onclick = () => { if (currentPage < totalPages()-1) { currentPage++; renderBinder(); }};

document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeFilter = tab.dataset.filter;
        currentPage = 0;
        renderBinder();
    });
});

renderBinder();
</script>
</body>
</html>
