<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gizem — 3 Kart, Birini Seç</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap">
<style>
:root {
    --bg: #0d0b0e;
    --bg-soft: #120f15;
    --gold: #e8c840;
    --gold-warm: #c9a646;
    --gold-border: rgba(180,140,60,0.25);
    --gold-border-strong: rgba(200,170,60,0.55);
    --gold-glow: rgba(232,200,64,0.3);
    --purple: #9a6aba;
    --text: #d4c8a0;
    --text-dim: #776a50;
    --text-muted: #5a5040;
    --font-display: 'Cinzel', Georgia, serif;
    --font-accent: 'Cormorant Garamond', Georgia, serif;
    --font-body: Georgia, serif;
    --ease-out: cubic-bezier(.2,.8,.3,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
}

/* ===== Backdrop ===== */
.backdrop {
    position: fixed; inset: 0; z-index: -2;
    background:
        radial-gradient(ellipse 70% 50% at 50% 40%, rgba(154,106,186,0.16), transparent 70%),
        radial-gradient(ellipse 90% 60% at 50% 10%, rgba(232,200,64,0.06), transparent 75%),
        radial-gradient(ellipse 80% 55% at 50% 100%, rgba(13,11,14,0.8), transparent 60%),
        linear-gradient(180deg, #0c0a14 0%, #0a0812 100%);
}
/* Animated sigil behind */
.backdrop-sigil {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; height: 900px;
    max-width: 140vw; max-height: 140vh;
    z-index: -2;
    opacity: 0.08;
    pointer-events: none;
    animation: rotate-slow 120s linear infinite;
    background:
        conic-gradient(from 0deg, transparent 0%, rgba(232,200,64,0.4) 25%, transparent 50%, rgba(154,106,186,0.4) 75%, transparent 100%);
    mask: radial-gradient(circle, transparent 38%, black 39%, black 41%, transparent 42%, transparent 48%, black 49%, black 50%, transparent 51%);
    -webkit-mask: radial-gradient(circle, transparent 38%, black 39%, black 41%, transparent 42%, transparent 48%, black 49%, black 50%, transparent 51%);
}
@keyframes rotate-slow { to { transform: translate(-50%, -50%) rotate(360deg); } }

/* Floating particles */
.backdrop-particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
    position: absolute;
    width: 2px; height: 2px;
    background: radial-gradient(circle, rgba(232,200,64,0.95), transparent 70%);
    border-radius: 50%;
    filter: blur(0.3px);
    animation: float-up linear infinite;
}
@keyframes float-up {
    0% { transform: translate(0, 100vh) scale(0.5); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.8; }
    100% { transform: translate(var(--drift, 30px), -10vh) scale(1.1); opacity: 0; }
}

/* Vignette */
.vignette {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background: radial-gradient(ellipse 120% 85% at 50% 50%, transparent 50%, rgba(5,3,8,0.75) 100%);
}

/* ===== Header (thin) ===== */
.modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px;
    border-bottom: 1px solid var(--gold-border);
    background: linear-gradient(180deg, rgba(10,8,14,0.9), rgba(10,8,14,0.6));
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
}
.btn-ghost {
    background: transparent; border: 1px solid var(--gold-border);
    color: var(--text); font-family: var(--font-body);
    padding: 8px 16px; cursor: pointer;
    letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.7rem;
    transition: all 0.3s var(--ease-out);
}
.btn-ghost:hover { border-color: var(--gold-border-strong); background: rgba(180,140,60,0.06); color: var(--gold); }
.breadcrumb {
    font-family: var(--font-display);
    color: var(--text-muted); font-size: 0.65rem;
    letter-spacing: 0.4em; text-transform: uppercase;
}
.breadcrumb em { color: var(--gold); font-style: normal; }

/* ===== Stage title ===== */
.stage {
    text-align: center;
    padding: 58px 24px 36px;
}
.stage-ornament {
    color: rgba(232,200,64,0.55);
    font-size: 0.8rem;
    letter-spacing: 0.6em;
    margin-bottom: 20px;
    display: inline-flex; align-items: center; gap: 14px;
}
.stage-ornament::before, .stage-ornament::after {
    content: ''; display: block; width: 70px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,140,60,0.55));
}
.stage-ornament::after { background: linear-gradient(90deg, rgba(180,140,60,0.55), transparent); }
.stage-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4.8vw, 3.2rem);
    color: var(--text);
    font-weight: 500;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    text-indent: 0.08em;
    filter: drop-shadow(0 4px 24px rgba(154,106,186,0.35));
}
.stage-title em { color: var(--gold); font-style: normal; font-weight: 600; text-shadow: 0 0 24px rgba(232,200,64,0.4); }
.stage-quote {
    font-family: var(--font-accent);
    font-style: italic;
    font-size: clamp(1rem, 1.7vw, 1.2rem);
    color: var(--text-dim);
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.55;
    letter-spacing: 0.02em;
}
.stage-quote::before { content: '“'; color: var(--gold); font-size: 1.4em; padding-right: 0.1em; }
.stage-quote::after { content: '”'; color: var(--gold); font-size: 1.4em; padding-left: 0.1em; }

/* ===== 3-Card Row ===== */
.cards-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 40px;
    padding: 32px 20px 20px;
    max-width: 1200px;
    margin: 0 auto;
    flex-wrap: wrap;
}

.card {
    position: relative;
    width: 260px; height: 380px;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.5s var(--ease-out), filter 0.4s;
    font-family: inherit;
    color: inherit;
    border: none;
    padding: 0;
    background: transparent;
    isolation: isolate;
    /* Enter animation base */
    animation: card-enter 0.8s var(--ease-out) both;
}
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.25s; }
.card:nth-child(3) { animation-delay: 0.4s; }
@keyframes card-enter {
    from { opacity: 0; transform: translateY(40px) rotateX(-10deg); }
    to   { opacity: 1; transform: translateY(0) rotateX(0); }
}

/* Ornamental frame around card */
.card::before {
    content: '';
    position: absolute; inset: -2px;
    border-radius: 10px;
    padding: 2px;
    background: conic-gradient(
        from 140deg,
        rgba(232,200,64,0.8) 0deg,
        rgba(180,140,60,0.4) 80deg,
        rgba(60,45,25,0.4) 180deg,
        rgba(180,140,60,0.4) 280deg,
        rgba(232,200,64,0.8) 360deg
    );
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    transition: filter 0.3s, opacity 0.3s;
    opacity: 0.85;
    pointer-events: none;
    z-index: 2;
}

/* Card image (ygoprodeck) */
.card-art {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    overflow: hidden;
    background: #1a1518;
    box-shadow: 0 16px 36px -10px rgba(0,0,0,0.9);
}
.card-art img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
    filter: saturate(0.95);
}
/* Bottom gradient for name legibility */
.card-art::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 55%, rgba(10,8,11,0.85) 88%, rgba(10,8,11,0.98) 100%);
}

.card-name {
    position: absolute;
    left: 16px; right: 16px; bottom: 14px;
    z-index: 3;
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    color: var(--text);
    text-align: center;
    text-transform: uppercase;
    text-shadow: 0 2px 12px rgba(0,0,0,0.95);
    font-weight: 500;
}

/* Rarity indicator — small sigil on top-right */
.card-rarity {
    position: absolute;
    top: 10px; right: 12px;
    z-index: 3;
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-indent: 0.35em;
    color: var(--rarity-color, var(--gold));
    text-transform: uppercase;
    padding: 3px 9px;
    background: rgba(10,8,11,0.75);
    border: 1px solid currentColor;
    border-radius: 2px;
    backdrop-filter: blur(6px);
}

/* Hover */
.card:hover:not(.selected) { transform: translateY(-10px); }
.card:hover:not(.selected)::before { filter: brightness(1.35); opacity: 1; }

/* Selected */
.card.selected {
    transform: translateY(-20px) scale(1.03);
    filter: drop-shadow(0 0 30px rgba(232,200,64,0.45));
}
.card.selected::before { opacity: 1; filter: brightness(1.6) saturate(1.2); }
.card.selected::after {
    content: 'SEÇİLDİ';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-8deg);
    font-family: var(--font-display);
    font-size: 1.1rem;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    padding: 10px 20px;
    background: rgba(10,8,11,0.82);
    border: 1px solid var(--gold);
    color: var(--gold);
    z-index: 4;
    pointer-events: none;
    text-shadow: 0 0 16px rgba(232,200,64,0.6);
    box-shadow: 0 0 40px rgba(232,200,64,0.25);
    animation: stamp 0.4s var(--ease-out) both;
}
@keyframes stamp {
    0%   { opacity: 0; transform: translate(-50%, -50%) rotate(-8deg) scale(1.8); }
    60%  { opacity: 1; transform: translate(-50%, -50%) rotate(-8deg) scale(0.95); }
    100% { opacity: 1; transform: translate(-50%, -50%) rotate(-8deg) scale(1); }
}
/* Pulsing aura on selected */
.card.selected .card-aura {
    position: absolute;
    inset: -10px;
    border-radius: 12px;
    border: 1.5px solid rgba(232,200,64,0.7);
    z-index: 1;
    pointer-events: none;
    animation: aura-pulse 2s ease-in-out infinite;
}
@keyframes aura-pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 0; transform: scale(1.12); }
}

/* When one is selected, dim the others */
.cards-row.has-selected .card:not(.selected) {
    opacity: 0.45;
    filter: saturate(0.5) brightness(0.7);
}

/* Rarity colors */
.card.rarity-common  { --rarity-color: var(--text-dim); }
.card.rarity-rare    { --rarity-color: #5aa8d8; }
.card.rarity-epic    { --rarity-color: var(--purple); }
.card.rarity-legend  { --rarity-color: var(--gold); }
.card.rarity-legend::before {
    background: conic-gradient(
        from 140deg,
        rgba(255,230,140,1) 0deg,
        rgba(232,200,64,0.7) 80deg,
        rgba(120,90,40,0.6) 180deg,
        rgba(232,200,64,0.7) 280deg,
        rgba(255,230,140,1) 360deg
    );
    opacity: 1;
    animation: legend-shine 3s linear infinite;
}
@keyframes legend-shine {
    to { filter: hue-rotate(4deg) brightness(1.1); }
}

/* ===== Action bar ===== */
.action-bar {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 36px 20px 48px;
    align-items: center;
}
.btn-primary {
    font-family: var(--font-display);
    font-size: 0.82rem;
    letter-spacing: 0.35em;
    text-indent: 0.35em;
    text-transform: uppercase;
    padding: 14px 40px;
    background: linear-gradient(180deg, rgba(232,200,64,0.2) 0%, rgba(200,170,60,0.12) 100%);
    color: var(--gold);
    border: 1px solid var(--gold-border-strong);
    cursor: pointer;
    transition: all 0.3s var(--ease-out);
    position: relative;
    overflow: hidden;
    font-weight: 600;
}
.btn-primary::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(232,200,64,0.3), transparent);
    transform: translateX(-100%);
    transition: transform 0.7s var(--ease-out);
}
.btn-primary:not(:disabled):hover {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(232,200,64,0.3) 0%, rgba(200,170,60,0.2) 100%);
    color: #fff;
    box-shadow: 0 0 28px rgba(232,200,64,0.25);
}
.btn-primary:not(:disabled):hover::before { transform: translateX(100%); }
.btn-primary:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    color: var(--text-muted);
    border-color: var(--gold-border);
}
.btn-primary-hint {
    font-family: var(--font-accent);
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-left: 12px;
}

/* Mobile */
@media (max-width: 760px) {
    .cards-row { gap: 16px; padding: 16px 12px 10px; }
    .card { width: 150px; height: 220px; }
    .card-name { font-size: 0.6rem; letter-spacing: 0.1em; left: 8px; right: 8px; bottom: 8px; }
    .card-rarity { font-size: 0.52rem; padding: 2px 6px; top: 6px; right: 6px; }
    .card.selected::after { font-size: 0.75rem; padding: 6px 12px; }
    .stage { padding: 30px 16px 18px; }
    .btn-primary { padding: 12px 28px; font-size: 0.72rem; letter-spacing: 0.25em; }
    .breadcrumb { font-size: 0.56rem; letter-spacing: 0.25em; }
    .modal-header { padding: 10px 16px; }
}
</style>
</head>
<body>

<div class="backdrop"></div>
<div class="backdrop-sigil"></div>
<div class="backdrop-particles" aria-hidden="true">
    <div class="particle" style="left:10%; animation-duration:20s; animation-delay:0s;  --drift: 22px;"></div>
    <div class="particle" style="left:22%; animation-duration:24s; animation-delay:-4s; --drift:-14px;"></div>
    <div class="particle" style="left:36%; animation-duration:22s; animation-delay:-10s;--drift: 10px;"></div>
    <div class="particle" style="left:54%; animation-duration:26s; animation-delay:-2s; --drift:-18px;"></div>
    <div class="particle" style="left:68%; animation-duration:18s; animation-delay:-8s; --drift: 14px;"></div>
    <div class="particle" style="left:82%; animation-duration:23s; animation-delay:-13s;--drift:-10px;"></div>
    <div class="particle" style="left:92%; animation-duration:27s; animation-delay:-6s; --drift: 16px;"></div>
</div>
<div class="vignette"></div>

<header class="modal-header">
    <button class="btn-ghost">‹ Ayrıl</button>
    <span class="breadcrumb">Düello Adası · <em>Gizem Sandığı</em></span>
    <span style="width:74px"></span>
</header>

<section class="stage">
    <div class="stage-ornament"><span>❖ ✦ ❖</span></div>
    <h1 class="stage-title">Üç <em>Kart</em>, Bir Kader</h1>
    <p class="stage-quote">Sandığı açtığında üç kart gördün. Üçü de senin olabilir, ama kaderin seçimi tek.</p>
</section>

<div class="cards-row" id="cardsRow">

    <!-- Card 1: Common -->
    <button class="card rarity-common" data-code="70781052">
        <span class="card-rarity">Sıradan</span>
        <div class="card-art">
            <img src="https://images.ygoprodeck.com/images/cards/70781052.jpg" alt="">
        </div>
        <div class="card-name">Gaia — Vahşi Şövalye</div>
        <span class="card-aura"></span>
    </button>

    <!-- Card 2: Rare -->
    <button class="card rarity-rare" data-code="46986414">
        <span class="card-rarity">Nadir</span>
        <div class="card-art">
            <img src="https://images.ygoprodeck.com/images/cards/46986414.jpg" alt="">
        </div>
        <div class="card-name">Karanlık Büyücü</div>
        <span class="card-aura"></span>
    </button>

    <!-- Card 3: Legend -->
    <button class="card rarity-legend" data-code="89631139">
        <span class="card-rarity">Efsane</span>
        <div class="card-art">
            <img src="https://images.ygoprodeck.com/images/cards/89631139.jpg" alt="">
        </div>
        <div class="card-name">Mavi Gözlü Beyaz Ejderha</div>
        <span class="card-aura"></span>
    </button>

</div>

<div class="action-bar">
    <button class="btn-primary" id="takeBtn" disabled>Kartı Al</button>
    <span class="btn-primary-hint">— önce bir kart seç —</span>
</div>

<script>
    const row = document.getElementById('cardsRow');
    const btn = document.getElementById('takeBtn');
    const hint = document.querySelector('.btn-primary-hint');
    row.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
            row.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            row.classList.add('has-selected');
            btn.disabled = false;
            hint.style.display = 'none';
        });
    });
</script>

</body>
</html>
