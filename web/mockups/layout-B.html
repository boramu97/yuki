<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout B — Bottom Bar Actions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia',serif;background:#0d0b0e;color:#d4c8a0;height:100vh;overflow:hidden;display:flex;flex-direction:column}

.hud{display:flex;justify-content:space-between;align-items:center;height:52px;background:#1a1520;border-bottom:1px solid rgba(180,140,60,0.12);padding:0 20px;flex-shrink:0}
.p-lp{font-size:24px;letter-spacing:2px}.p-lp.gold{color:#e8c840}.p-lp.purple{color:#9a6aba}
.p-name{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:#776a50}
.hud-mid .turn{font-size:18px;color:#e8c840;letter-spacing:4px}
.hud-mid .phase{font-size:9px;color:#5a5040;letter-spacing:2px;text-align:center}

.body{flex:1;display:flex;min-height:0}

/* SOL: Aktif Efektler */
.panel-left{width:18vw;min-width:250px;background:#13101a;border-right:1px solid rgba(180,140,60,0.12);display:flex;flex-direction:column}
.panel-title{font-size:1rem;text-transform:uppercase;letter-spacing:2px;color:#5a5040;padding:12px 14px;border-bottom:1px solid rgba(180,140,60,0.08)}
.effects-list{flex:1;overflow-y:auto;padding:8px}
.effect-banner{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.95rem}
.effect-banner img{width:42px;height:58px;border-radius:3px;object-fit:cover;border:1px solid rgba(255,255,255,0.1)}
.ename{color:#4fc3f7;font-weight:600}.edesc{font-size:0.8rem;color:#776a50}

/* ORTA */
.center{flex:1;display:flex;flex-direction:column}
.field{flex:1;display:flex;flex-direction:column;justify-content:center;padding:2px 1vw;gap:2px;position:relative}
.field-row{display:flex;gap:0.5vw;justify-content:center}

/* Durum — sahalar arasi */
.status-bar{display:flex;align-items:center;justify-content:center;padding:4px;margin:2px 3vw}
.status-bar .line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(180,140,60,0.15),transparent)}
.status-text{font-size:0.95rem;color:#e8c840;font-style:italic;padding:0 14px;white-space:nowrap}

/* Kart */
.slot{width:6.5vw;height:8.8vw;border:1px solid rgba(180,140,60,0.08);border-radius:3px;background:rgba(180,140,60,0.015);position:relative}
.card{width:100%;height:100%;border-radius:3px;overflow:hidden;position:relative;cursor:pointer}
.card img{width:100%;height:100%;object-fit:fill}
.card.facedown{background:#6b4c2a;border:2px solid #b8960a;display:flex;align-items:center;justify-content:center}
.card.facedown::after{content:"";width:55%;height:60%;background:#1a1a1a;border-radius:50%;border:2px solid #2a2a2a}
.card .stats{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);font-size:0.6vw;text-align:center;padding:1px;font-weight:700}
.card .stats .a{color:#c8a030}.card .stats .d{color:#7090c0}
.card .counter-badge{position:absolute;top:2px;right:2px;width:1.3vw;height:1.3vw;min-width:16px;min-height:16px;background:radial-gradient(circle,#4fc3f7,#0288d1);border:2px solid #b3e5fc;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6vw;font-weight:900;color:#fff;font-family:sans-serif}

/* Kart tıklama — aksyon popup */
.card-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,11,14,0.95);border:1px solid rgba(180,140,60,0.3);border-radius:6px;padding:6px;display:none;flex-direction:column;gap:3px;z-index:40;min-width:10vw;backdrop-filter:blur(4px)}
.card:focus .card-popup,.card.active .card-popup{display:flex}
.card-popup button{padding:6px 10px;border:1px solid rgba(180,140,60,0.2);border-radius:3px;background:rgba(180,140,60,0.06);color:#d4c8a0;font-size:0.75vw;cursor:pointer;font-family:inherit;white-space:nowrap;text-align:left}
.card-popup button:hover{background:rgba(180,80,30,0.2);border-color:rgba(200,100,40,0.4);color:#e8c840}

/* El */
.hand{display:flex;justify-content:center;padding:2px 20px;min-height:10vw;margin-top:-1.2vw;position:relative;z-index:20}
.hand-card{width:7vw;height:9.5vw;border-radius:4px;overflow:hidden;cursor:pointer;transition:all 0.25s;margin-left:-1vw;box-shadow:-2px 0 8px rgba(0,0,0,0.5);position:relative;border:1px solid rgba(200,170,60,0.2)}
.hand-card:first-child{margin-left:0}
.hand-card:hover{transform:translateY(-1.8vw) scale(1.1);border-color:#e8c840;box-shadow:0 8px 25px rgba(200,160,40,0.3);z-index:30}
.hand-card img{width:100%;height:100%;object-fit:fill}

/* ALT BAR — Tur aksyonlari + durum */
.bottom-bar{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 20px;background:#13101a;border-top:1px solid rgba(180,140,60,0.12);flex-shrink:0}
.bottom-bar button{padding:10px 22px;border:1px solid rgba(180,140,60,0.2);border-radius:4px;background:rgba(180,140,60,0.04);color:#d4c8a0;font-family:inherit;font-size:1.1rem;cursor:pointer}
.bottom-bar button:hover{border-color:#e8c840;color:#e8c840}
.bottom-bar button.go{background:linear-gradient(135deg,rgba(180,80,30,0.3),rgba(140,60,20,0.3));border-color:rgba(200,100,40,0.4);color:#e8a040}
.bottom-bar .auto-toggle{font-size:0.9rem;color:#5a5040;display:flex;align-items:center;gap:6px}
.bottom-bar .auto-toggle input{accent-color:#e8c840}

/* SAG: Log */
.panel-right{width:18vw;min-width:250px;background:#13101a;border-left:1px solid rgba(180,140,60,0.12);display:flex;flex-direction:column}
.log-list{flex:1;overflow-y:auto;padding:8px 10px;font-family:'Segoe UI',sans-serif}
.log-entry{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:1rem;color:#776a50}
.log-entry.important{color:#e8c840;font-weight:600}
.log-entry.damage{color:#e05040}
.log-entry img{width:36px;height:50px;border-radius:2px;object-fit:cover;flex-shrink:0}
</style>
</head>
<body>

<div class="hud">
    <div><div class="p-name">Kaiba</div><div class="p-lp purple">4960</div></div>
    <div class="hud-mid"><div class="turn">V</div><div class="phase">Main Phase</div></div>
    <div style="text-align:right"><div class="p-name">Yugi</div><div class="p-lp gold">8000</div></div>
</div>

<div class="body">
    <div class="panel-left">
        <div class="panel-title">Aktif Efektler</div>
        <div class="effects-list">
            <div class="effect-banner"><img src="https://images.ygoprodeck.com/images/cards_small/72302403.jpg"><div><div class="ename">Swords of Revealing Light</div><div class="edesc">2 tur kaldi</div></div></div>
            <div class="effect-banner"><img src="https://images.ygoprodeck.com/images/cards_small/71413901.jpg"><div><div class="ename" style="color:#e8c840">Breaker — 1 Counter</div><div class="edesc">ATK +300</div></div></div>
        </div>
    </div>

    <div class="center">
        <div class="field">
            <div class="field-row">
                <div class="slot"></div><div class="slot"></div>
                <div class="slot"><div class="card facedown"></div></div>
                <div class="slot"></div><div class="slot"></div>
            </div>
            <div class="field-row">
                <div class="slot"></div>
                <div class="slot"><div class="card"><img src="https://images.ygoprodeck.com/images/cards_small/14898066.jpg"><div class="stats"><span class="a">1900</span>/<span class="d">1200</span></div></div></div>
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            </div>

            <div class="status-bar"><div class="line"></div><div class="status-text">Ana Faz — Hamle yap veya savas fazina gec</div><div class="line"></div></div>

            <div class="field-row">
                <div class="slot"></div>
                <div class="slot">
                    <div class="card active">
                        <img src="https://images.ygoprodeck.com/images/cards_small/71413901.jpg">
                        <div class="stats"><span class="a">1900</span>/<span class="d">1000</span></div>
                        <div class="counter-badge">1</div>
                        <div class="card-popup" style="display:flex">
                            <button>Pozisyon Degistir</button>
                            <button>Efekt: Counter Kaldir</button>
                        </div>
                    </div>
                </div>
                <div class="slot"><div class="card"><img src="https://images.ygoprodeck.com/images/cards_small/43096270.jpg"><div class="stats"><span class="a">2000</span>/<span class="d">100</span></div></div></div>
                <div class="slot"></div><div class="slot"></div>
            </div>
            <div class="field-row">
                <div class="slot"></div><div class="slot"></div>
                <div class="slot"><div class="card"><img src="https://images.ygoprodeck.com/images/cards_small/44095762.jpg"></div></div>
                <div class="slot"></div><div class="slot"></div>
            </div>
        </div>

        <div class="hand">
            <div class="hand-card"><img src="https://images.ygoprodeck.com/images/cards_small/38033121.jpg"></div>
            <div class="hand-card"><img src="https://images.ygoprodeck.com/images/cards_small/46986414.jpg"></div>
            <div class="hand-card"><img src="https://images.ygoprodeck.com/images/cards_small/40640057.jpg"></div>
            <div class="hand-card"><img src="https://images.ygoprodeck.com/images/cards_small/83764718.jpg"></div>
        </div>
    </div>

    <div class="panel-right">
        <div class="panel-title">Hamle Gecmisi</div>
        <div class="log-list">
            <div class="log-entry important"><img src="https://images.ygoprodeck.com/images/cards_small/71413901.jpg"><span>Breaker cagrildi</span></div>
            <div class="log-entry"><img src="https://images.ygoprodeck.com/images/cards_small/71413901.jpg"><span>+1 Spell Counter</span></div>
            <div class="log-entry damage"><span>Kaiba -1900 LP</span></div>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <button class="go">Savas Fazina Gec</button>
    <button>Turu Bitir</button>
    <label class="auto-toggle"><input type="checkbox" checked> Oto-pas</label>
</div>

</body>
</html>
