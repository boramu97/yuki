<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout A — Centered Actions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia',serif;background:#0d0b0e;color:#d4c8a0;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* HUD */
.hud{display:flex;justify-content:space-between;align-items:center;height:56px;background:#1a1520;border-bottom:1px solid rgba(180,140,60,0.12);padding:0 20px;flex-shrink:0}
.p-side{display:flex;align-items:center;gap:12px}
.p-lp{font-size:26px;font-weight:400;letter-spacing:2px}
.p-lp.gold{color:#e8c840}.p-lp.purple{color:#9a6aba}
.p-name{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:#776a50}
.hud-mid{display:flex;flex-direction:column;align-items:center}
.hud-mid .turn{font-size:20px;color:#e8c840;letter-spacing:4px}
.hud-mid .phase{font-size:10px;color:#5a5040;letter-spacing:2px}

/* 3 SUTUN: Sol(aktif efektler) + Orta(saha) + Sag(log) */
.body{flex:1;display:flex;min-height:0}

/* SOL PANEL — Aktif Efektler */
.panel-left{width:20vw;min-width:280px;background:#13101a;border-right:1px solid rgba(180,140,60,0.12);display:flex;flex-direction:column;overflow:hidden}
.panel-title{font-size:1.1rem;text-transform:uppercase;letter-spacing:2px;color:#5a5040;padding:14px 16px;border-bottom:1px solid rgba(180,140,60,0.08)}
.effects-list{flex:1;overflow-y:auto;padding:10px}
.effect-banner{display:flex;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:1rem}
.effect-banner img{width:48px;height:66px;border-radius:3px;object-fit:cover;border:1px solid rgba(255,255,255,0.1)}
.effect-banner .ename{color:#4fc3f7;font-weight:600}
.effect-banner .edesc{font-size:0.85rem;color:#776a50}
.effect-banner.counter .ename{color:#e8c840}
.effect-banner.trap .ename{color:#ce93d8}

/* ORTA */
.center{flex:1;display:flex;flex-direction:column;min-width:0}

/* Saha */
.field{flex:1;display:flex;flex-direction:column;justify-content:center;padding:4px 1vw;gap:3px;position:relative;
    background:radial-gradient(ellipse at 50% 30%,rgba(100,50,20,0.05),transparent 50%),radial-gradient(ellipse at 50% 70%,rgba(60,30,100,0.05),transparent 50%)}
.field-row{display:flex;gap:0.6vw;justify-content:center}

/* DURUM PANELI — iki saha arasinda */
.status-bar{display:flex;align-items:center;justify-content:center;padding:6px;gap:12px}
.status-bar .sep{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(180,140,60,0.15),transparent)}
.status-text{font-size:1rem;color:#e8c840;font-style:italic;letter-spacing:1px;white-space:nowrap;padding:0 12px}

/* Kart slotu */
.slot{width:7vw;height:9.5vw;border:1px solid rgba(180,140,60,0.08);border-radius:3px;background:rgba(180,140,60,0.015);position:relative}

/* Kart — gorseli tam sigdiran */
.card{width:100%;height:100%;border-radius:3px;overflow:hidden;position:relative;cursor:pointer}
.card img{width:100%;height:100%;object-fit:fill;display:block}
.card.facedown{background:#6b4c2a;border:2px solid #b8960a;display:flex;align-items:center;justify-content:center}
.card.facedown::after{content:"";width:55%;height:60%;background:#1a1a1a;border-radius:50%;border:2px solid #2a2a2a}

/* Kart uzerinde aksyon overlay */
.card-actions{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:none;flex-direction:column;justify-content:center;gap:4px;padding:4px;border-radius:3px;z-index:10}
.card:hover .card-actions.has-actions{display:flex}
.card-actions button{padding:4px 6px;border:1px solid rgba(200,170,60,0.3);border-radius:3px;background:rgba(180,140,60,0.1);color:#e8c840;font-size:0.7vw;cursor:pointer;font-family:inherit}
.card-actions button:hover{background:rgba(180,80,30,0.3);border-color:rgba(200,100,40,0.5)}
.card-actions button.primary{background:rgba(180,80,30,0.4);border-color:rgba(200,100,40,0.5)}

/* Kart stat overlay */
.card .stats{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);font-size:0.65vw;text-align:center;padding:1px;font-weight:700}
.card .stats .a{color:#c8a030}.card .stats .d{color:#7090c0}
.card .counter-badge{position:absolute;top:3px;right:3px;width:1.5vw;height:1.5vw;min-width:18px;min-height:18px;background:radial-gradient(circle,#4fc3f7,#0288d1);border:2px solid #b3e5fc;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7vw;font-weight:900;color:#fff;font-family:sans-serif}

/* El kartlari */
.hand{display:flex;justify-content:center;padding:4px 20px;min-height:11vw;margin-top:-1.5vw;position:relative;z-index:20}
.hand-card{width:7.5vw;height:10.2vw;border-radius:4px;overflow:hidden;cursor:pointer;transition:all 0.25s;margin-left:-1.2vw;box-shadow:-2px 0 8px rgba(0,0,0,0.5);position:relative;border:1px solid rgba(200,170,60,0.2)}
.hand-card:first-child{margin-left:0}
.hand-card:hover{transform:translateY(-2vw) scale(1.12);border-color:#e8c840;box-shadow:0 10px 30px rgba(200,160,40,0.3);z-index:30}
.hand-card img{width:100%;height:100%;object-fit:fill;display:block}

/* TUR AKSYON PANELI — sag alt koşe */
.turn-actions{position:fixed;bottom:12px;right:22vw;display:flex;gap:8px;z-index:50;padding:10px 14px;background:rgba(19,16,26,0.95);border:1px solid rgba(180,140,60,0.15);border-radius:8px}
.turn-actions button{padding:10px 18px;border:1px solid rgba(180,140,60,0.2);border-radius:4px;background:rgba(180,140,60,0.04);color:#d4c8a0;font-family:inherit;font-size:1rem;cursor:pointer}
.turn-actions button:hover{border-color:#e8c840;color:#e8c840}
.turn-actions button.go{background:linear-gradient(135deg,rgba(180,80,30,0.3),rgba(140,60,20,0.3));border-color:rgba(200,100,40,0.4);color:#e8a040}

/* SAG PANEL — Log */
.panel-right{width:20vw;min-width:280px;background:#13101a;border-left:1px solid rgba(180,140,60,0.12);display:flex;flex-direction:column;overflow:hidden}
.log-list{flex:1;overflow-y:auto;padding:10px 12px;font-family:'Segoe UI',system-ui,sans-serif}
.log-entry{display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:1.05rem;color:#776a50;line-height:1.5}
.log-entry.important{color:#e8c840;font-weight:600}
.log-entry.damage{color:#e05040}
.log-entry img{width:40px;height:55px;border-radius:3px;object-fit:cover;flex-shrink:0}
</style>
</head>
<body>

<div class="hud">
    <div class="p-side"><div><div class="p-name">Kaiba</div><div class="p-lp purple">4960</div></div></div>
    <div class="hud-mid"><div class="turn">V</div><div class="phase">Main Phase</div></div>
    <div class="p-side"><div style="text-align:right"><div class="p-name">Yugi</div><div class="p-lp gold">8000</div></div></div>
</div>

<div class="body">
    <!-- SOL: Aktif Efektler -->
    <div class="panel-left">
        <div class="panel-title">Aktif Efektler</div>
        <div class="effects-list">
            <div class="effect-banner">
                <img src="https://images.ygoprodeck.com/images/cards_small/72302403.jpg">
                <div><div class="ename">Swords of Revealing Light</div><div class="edesc">2 tur kaldi</div></div>
            </div>
            <div class="effect-banner counter">
                <img src="https://images.ygoprodeck.com/images/cards_small/71413901.jpg">
                <div><div class="ename">Breaker — 1 Spell Counter</div><div class="edesc">ATK +300</div></div>
            </div>
            <div class="effect-banner trap">
                <img src="https://images.ygoprodeck.com/images/cards_small/18807108.jpg">
                <div><div class="ename">Spellbinding Circle</div><div class="edesc">Hedef: Vorse Raider</div></div>
            </div>
        </div>
    </div>

    <!-- ORTA -->
    <div class="center">
        <div class="field">
            <!-- Rakip S/T -->
            <div class="field-row">
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"><div class="card facedown"></div></div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>
            <!-- Rakip Monster -->
            <div class="field-row">
                <div class="slot"></div>
                <div class="slot">
                    <div class="card">
                        <img src="https://images.ygoprodeck.com/images/cards_small/14898066.jpg">
                        <div class="stats"><span class="a">1900</span>/<span class="d">1200</span></div>
                    </div>
                </div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>

            <!-- DURUM PANELI -->
            <div class="status-bar">
                <div class="sep"></div>
                <div class="status-text">Saldiri hedefi sec...</div>
                <div class="sep"></div>
            </div>

            <!-- Kendi Monster -->
            <div class="field-row">
                <div class="slot"></div>
                <div class="slot">
                    <div class="card">
                        <img src="https://images.ygoprodeck.com/images/cards_small/71413901.jpg">
                        <div class="stats"><span class="a">1900</span>/<span class="d">1000</span></div>
                        <div class="counter-badge">1</div>
                        <!-- Aksyon overlay — hover'da gorunur -->
                        <div class="card-actions has-actions">
                            <button class="primary">Saldir</button>
                            <button>Pozisyon Degistir</button>
                            <button>Efekt: Counter Kaldir</button>
                        </div>
                    </div>
                </div>
                <div class="slot">
                    <div class="card">
                        <img src="https://images.ygoprodeck.com/images/cards_small/43096270.jpg">
                        <div class="stats"><span class="a">2000</span>/<span class="d">100</span></div>
                        <div class="card-actions has-actions">
                            <button class="primary">Saldir</button>
                            <button>Pozisyon Degistir</button>
                        </div>
                    </div>
                </div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>
            <!-- Kendi S/T -->
            <div class="field-row">
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot">
                    <div class="card">
                        <img src="https://images.ygoprodeck.com/images/cards_small/44095762.jpg">
                        <div class="card-actions has-actions">
                            <button class="primary">Aktifle</button>
                        </div>
                    </div>
                </div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>
        </div>

        <!-- El -->
        <div class="hand">
            <div class="hand-card"><img src="https://images.ygoprodeck.com/images/cards_small/38033121.jpg"></div>
            <div class="hand-card"><img src="https://images.ygoprodeck.com/images/cards_small/46986414.jpg"></div>
            <div class="hand-card"><img src="https://images.ygoprodeck.com/images/cards_small/40640057.jpg"></div>
            <div class="hand-card"><img src="https://images.ygoprodeck.com/images/cards_small/83764718.jpg"></div>
        </div>
    </div>

    <!-- SAG: Log -->
    <div class="panel-right">
        <div class="panel-title">Hamle Gecmisi</div>
        <div class="log-list">
            <div class="log-entry important"><img src="https://images.ygoprodeck.com/images/cards_small/71413901.jpg"><span>Breaker cagrildi</span></div>
            <div class="log-entry"><img src="https://images.ygoprodeck.com/images/cards_small/71413901.jpg"><span>+1 Spell Counter</span></div>
            <div class="log-entry damage"><span>Kaiba -1900 LP</span></div>
            <div class="log-entry important">━━━ Tur 5 (Yugi) ━━━</div>
        </div>
    </div>
</div>

<!-- TUR AKSYONLARI — sag alt -->
<div class="turn-actions">
    <button class="go">Savas Fazina Gec</button>
    <button>Turu Bitir</button>
</div>

</body>
</html>
