<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuki — Duel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- LOBI -->
    <div id="lobby" class="screen active">
        <h1>Yuki</h1>
        <p class="subtitle">Browser-Based Duel Game</p>
        <div class="lobby-form">
            <input type="text" id="player-name" placeholder="Adini gir..." maxlength="20">
            <div class="lobby-buttons">
                <button id="btn-quick-match" class="btn primary">Hizli Eslesme</button>
                <button id="btn-create-room" class="btn">Oda Olustur</button>
            </div>
            <div class="join-section">
                <input type="text" id="room-code" placeholder="Oda kodu..." maxlength="8">
                <button id="btn-join-room" class="btn">Katil</button>
            </div>
        </div>
        <div id="lobby-status" class="status"></div>
    </div>

    <!-- BEKLEME -->
    <div id="waiting" class="screen">
        <h2>Oda: <span id="waiting-room-id"></span></h2>
        <p style="color:#776a50;font-style:italic;font-size:1.1rem">Rakip bekleniyor...</p>
        <div class="loader"></div>
    </div>

    <!-- DUELLO — Full width + floating panels -->
    <div id="duel" class="screen">
        <!-- HUD -->
        <div class="duel-hud">
            <div class="player-info opponent">
                <div class="p-emblem"><span id="opp-initial">R</span></div>
                <div class="p-details">
                    <span class="player-name" id="opp-name">Rakip</span>
                    <span class="player-lp" id="opp-lp">8000</span>
                    <div class="lp-bar"><div class="lp-bar-fill" id="opp-lp-bar"></div></div>
                </div>
            </div>
            <div class="turn-info">
                <span id="turn-counter">I</span>
                <span id="phase-name">-</span>
            </div>
            <div class="player-info self">
                <div class="p-details" style="text-align:right">
                    <span class="player-name" id="self-name">Sen</span>
                    <span class="player-lp" id="self-lp">8000</span>
                    <div class="lp-bar"><div class="lp-bar-fill" id="self-lp-bar"></div></div>
                </div>
                <div class="p-emblem"><span id="self-initial">S</span></div>
            </div>
        </div>

        <!-- Full width field wrap -->
        <div class="field-wrap">
            <!-- Floating: Aktif Efektler (sol) -->
            <div class="float-panel left" id="effects-panel">
                <div class="fp-title">Aktif Efektler</div>
                <div class="fp-list" id="effects-list"></div>
            </div>

            <!-- Floating: Hamle Gecmisi (sag) -->
            <div class="float-panel right" id="log-panel">
                <div class="fp-title">Hamle Gecmisi</div>
                <div class="fp-list" id="duel-log"></div>
            </div>

            <!-- Floating: Tur Aksyonlari (sag alt) — SABIT -->
            <div class="turn-panel" id="turn-panel" style="display:none">
                <button class="go" id="btn-battle">Savas Fazina Gec</button>
                <button id="btn-end-turn">Turu Bitir</button>
                <label class="auto-toggle">
                    <input type="checkbox" id="auto-pass-check" checked>
                    <span>Oto-pas</span>
                </label>
            </div>

            <!-- Floating: Dinamik secim paneli (sag alt, tur panelinin ustunde) -->
            <div class="select-panel" id="select-panel" style="display:none"></div>

            <!-- SAHA -->
            <div class="field">
                <div class="field-row" id="opp-szone">
                    <div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div>
                </div>
                <div class="field-row" id="opp-mzone">
                    <div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div>
                </div>

                <!-- Durum cubugu -->
                <div class="status-strip">
                    <div class="line"></div>
                    <div id="status-text">Duello baslamadi</div>
                    <div class="line"></div>
                </div>

                <div class="field-row" id="self-mzone">
                    <div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div>
                </div>
                <div class="field-row" id="self-szone">
                    <div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div>
                </div>
            </div>

            <!-- El -->
            <div class="hand-area" id="hand"></div>
        </div>
    </div>

    <!-- Sag tik onizleme -->
    <div id="card-preview-overlay">
        <div class="preview-content">
            <img id="preview-img" src="">
            <div id="preview-name"></div>
        </div>
    </div>

    <!-- SONUC -->
    <div id="result" class="screen">
        <h2 id="result-text"></h2>
        <button class="btn primary" style="font-size:1.1rem;padding:12px 32px" onclick="location.reload()">Lobiye Don</button>
    </div>

    <script src="js/websocket.js"></script>
    <script src="js/field.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
