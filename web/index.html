<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuki — Duel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- GİRİŞ / KAYIT -->
    <div id="auth-screen" class="screen active">
        <h1>Yuki</h1>
        <p class="subtitle">Browser-Based Duel Game</p>
        <div class="auth-form">
            <input type="text" id="auth-username" placeholder="Kullanici adi..." maxlength="20">
            <input type="password" id="auth-password" placeholder="Sifre..." maxlength="50">
            <div id="auth-status" class="status"></div>
            <div class="lobby-buttons">
                <button id="btn-login" class="btn primary">Giris Yap</button>
                <button id="btn-register" class="btn">Kayit Ol</button>
            </div>
        </div>
        <div class="lobby-footer">
            <span>AGPLv3 — <a href="https://github.com/boramu97/yuki" target="_blank">Kaynak Kod</a></span>
            <span>Motor: <a href="https://github.com/edo9300/ygopro-core" target="_blank">OCGCore</a> (edo9300)</span>
        </div>
    </div>

    <!-- ANA SAYFA -->
    <div id="home-screen" class="screen">
        <div class="home-header">
            <h1>Yuki</h1>
            <div class="home-user">
                <span id="home-username"></span>
                <button id="btn-logout" class="btn btn-small">Cikis</button>
            </div>
        </div>
        <div class="home-nav">
            <button class="home-card" id="nav-duel">
                <div class="home-card-icon">⚔</div>
                <div class="home-card-title">Duello</div>
                <div class="home-card-desc">Rakiplerle canli duel yap</div>
            </button>
            <button class="home-card" id="nav-collection" disabled>
                <div class="home-card-icon">🃏</div>
                <div class="home-card-title">Koleksiyonum</div>
                <div class="home-card-desc">Yakin zamanda...</div>
            </button>
            <button class="home-card" id="nav-adventures" disabled>
                <div class="home-card-icon">🗺</div>
                <div class="home-card-title">Maceralar</div>
                <div class="home-card-desc">Yakin zamanda...</div>
            </button>
        </div>
        <div class="lobby-footer">
            <span>AGPLv3 — <a href="https://github.com/boramu97/yuki" target="_blank">Kaynak Kod</a></span>
            <span>Motor: <a href="https://github.com/edo9300/ygopro-core" target="_blank">OCGCore</a> (edo9300)</span>
        </div>
    </div>

    <!-- LOBI -->
    <div id="lobby" class="screen">
        <h1>Yuki</h1>
        <p class="subtitle">Browser-Based Duel Game</p>
        <div class="lobby-form">
            <div class="lobby-buttons">
                <button id="btn-quick-match" class="btn primary">Hizli Eslesme</button>
                <button id="btn-create-room" class="btn">Oda Olustur</button>
            </div>
            <div class="join-section">
                <input type="text" id="room-code" placeholder="Oda kodu..." maxlength="8">
                <button id="btn-join-room" class="btn">Katil</button>
            </div>
            <button id="btn-back-home" class="btn" style="margin-top:1rem;width:100%">← Ana Sayfa</button>
        </div>
        <div id="lobby-status" class="status"></div>
    </div>

    <!-- BEKLEME -->
    <div id="waiting" class="screen">
        <h2>Oda: <span id="waiting-room-id"></span></h2>
        <p style="color:#776a50;font-style:italic;font-size:1.1rem">Rakip bekleniyor...</p>
        <div class="loader"></div>
    </div>

    <!-- DUELLO — Full width + floating panels -->
    <div id="duel" class="screen">
        <!-- HUD -->
        <div class="duel-hud">
            <div class="player-info opponent">
                <div class="p-emblem"><span id="opp-initial">R</span></div>
                <div class="p-details">
                    <span class="player-name" id="opp-name">Rakip</span>
                    <span class="player-lp" id="opp-lp">8000</span>
                    <div class="lp-bar"><div class="lp-bar-fill" id="opp-lp-bar"></div></div>
                </div>
            </div>
            <div class="turn-info">
                <span id="turn-counter">I</span>
                <span id="phase-name">-</span>
            </div>
            <div class="player-info self">
                <div class="p-details" style="text-align:right">
                    <span class="player-name" id="self-name">Sen</span>
                    <span class="player-lp" id="self-lp">8000</span>
                    <div class="lp-bar"><div class="lp-bar-fill" id="self-lp-bar"></div></div>
                </div>
                <div class="p-emblem"><span id="self-initial">S</span></div>
            </div>
        </div>

        <!-- Full width field wrap -->
        <div class="field-wrap">
            <!-- Floating: Aktif Efektler (sol) -->
            <div class="float-panel left" id="effects-panel">
                <div class="fp-title">Aktif Efektler</div>
                <div class="fp-list" id="effects-list"></div>
            </div>

            <!-- Floating: Hamle Gecmisi (sol) -->
            <div class="float-panel left" id="log-panel">
                <div class="fp-title">Hamle Gecmisi</div>
                <div class="fp-list" id="duel-log"></div>
            </div>

            <!-- Motor Iletisim Paneli (sol) -->
            <div id="motor-panel" class="motor-panel">
                <div class="mp-header">
                    <div class="mp-phase-badge" id="mp-phase"></div>
                    <div class="mp-question" id="mp-question">Motor yanit bekliyor...</div>
                </div>
                <div class="mp-actions" id="mp-actions"></div>
                <div class="mp-footer" id="mp-footer">
                    <div class="mp-footer-actions" id="mp-footer-actions"></div>
                    <label class="mp-auto-toggle">
                        <input type="checkbox" id="mp-auto-pass" checked>
                        <span>Otomatik pas</span>
                    </label>
                </div>
            </div>

            <!-- SAHA -->
            <div class="field">
                <div class="field-row" id="opp-szone">
                    <div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div>
                </div>
                <div class="field-row" id="opp-mzone">
                    <div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div>
                </div>

                <!-- Durum cubugu -->
                <div class="status-strip">
                    <div class="line"></div>
                    <div id="status-text">Duello baslamadi</div>
                    <div class="line"></div>
                </div>

                <div class="field-row" id="self-mzone">
                    <div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div>
                </div>
                <div class="field-row" id="self-szone">
                    <div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div><div class="card-slot"></div>
                </div>
            </div>

            <!-- El -->
            <div class="hand-area" id="hand"></div>
        </div>
    </div>

    <!-- Sag tik onizleme -->
    <div id="card-preview-overlay">
        <div class="preview-content">
            <img id="preview-img" src="">
            <div id="preview-name"></div>
        </div>
    </div>

    <!-- SONUC -->
    <div id="result" class="screen">
        <h2 id="result-text"></h2>
        <button class="btn primary" style="font-size:1.1rem;padding:12px 32px" onclick="location.reload()">Ana Sayfaya Don</button>
    </div>

    <script src="js/websocket.js"></script>
    <script src="js/field.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
